<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReelTwo — Watch Together</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
 --rose:#c9707a;--rose-l:#e8a6ad;--rose-p:#f5dde0;
 --cream:#fdf6ef;--cream-d:#f0e5d8;--brown:#6b4c3b;
 --text:#3a2820;--muted:#9c7b6e;
 --dark:#1a0f0a;--dark2:#2a1a14;
}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column}
#lobby{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:var(--cream);color:var(--text);gap:2rem;padding:2rem}
.logo{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:600;color:var(--rose)}
.logo span{font-style:italic;color:var(--brown)}
.lobby-card{background:#fff;border-radius:20px;padding:2.5rem;width:min(420px,100%);box-shadow:0 8px 40px rgba(58,40,32,0.12);border:1px solid var(--rose-p)}
.lobby-card h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:400;margin-bottom:1.5rem;color:var(--text)}
.field{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem}
label{font-size:.78rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
input{padding:.75rem 1rem;border:1.5px solid var(--cream-d);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--text);background:var(--cream);outline:none;transition:border-color .2s}
input:focus{border-color:var(--rose)}
.btn{width:100%;padding:.85rem;border-radius:100px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;transition:all .2s}
.btn-rose{background:var(--rose);color:#fff;box-shadow:0 4px 16px rgba(201,112,122,.35)}
.btn-rose:hover{background:var(--brown);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--brown);border:1.5px solid var(--rose-l);margin-top:.6rem}
.btn-ghost:hover{border-color:var(--rose);color:var(--rose)}
.divider{text-align:center;color:var(--muted);font-size:.8rem;margin:.6rem 0}
#app{display:none;flex-direction:row;height:100vh;overflow:hidden}
#app.active{display:flex}
#video-area{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--dark)}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;background:var(--dark2);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;gap:.8rem;flex-wrap:wrap}
.top-bar .logo{font-size:1.2rem}
.room-badge{background:rgba(201,112,122,.15);border:1px solid rgba(201,112,122,.3);color:var(--rose-l);font-size:.75rem;padding:.3rem .8rem;border-radius:100px;cursor:pointer}
.members-strip{display:flex;gap:.4rem;align-items:center}
.member-pip{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:600;border:2px solid var(--dark2)}
#video-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;min-height:0}
#video-wrap video{max-width:100%;max-height:100%;width:100%;height:100%;object-fit:contain}
#upload-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;background:var(--dark)}
#upload-overlay.hidden{display:none}
#upload-overlay h3{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:400;color:var(--rose-l)}
#upload-overlay p{color:rgba(255,255,255,.4);font-size:.9rem;font-weight:300;text-align:center;max-width:300px}
#upload-btn{background:var(--rose);color:#fff;border:none;padding:.8rem 2rem;border-radius:100px;cursor:pointer;font-size:.9rem;font-family:'DM Sans',sans-serif;font-weight:500;transition:background .2s}
#upload-btn:hover{background:var(--brown)}
#file-input{display:none}
#upload-progress{width:240px;display:none;flex-direction:column;align-items:center;gap:.5rem}
#upload-progress p{color:rgba(255,255,255,.5);font-size:.8rem}
.progress-wrap{width:100%;height:4px;background:rgba(255,255,255,.1);border-radius:100px;overflow:hidden}
#progress-bar{height:100%;background:var(--rose);border-radius:100px;width:0;transition:width .3s}
#controls{padding:.6rem 1rem;background:var(--dark2);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:1rem;flex-shrink:0}
#controls.hidden{display:none}
.ctrl-btn{background:transparent;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:1.3rem;padding:.3rem;border-radius:8px;transition:color .2s,background .2s;line-height:1}
.ctrl-btn:hover{color:#fff;background:rgba(255,255,255,.1)}
#seek-wrap{flex:1;cursor:pointer;height:18px;display:flex;align-items:center}
#seek-bg{width:100%;height:4px;background:rgba(255,255,255,.15);border-radius:100px;position:relative}
#seek-fill{height:100%;background:var(--rose);border-radius:100px;width:0}
#seek-thumb{position:absolute;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:#fff;left:0}
#time-display{color:rgba(255,255,255,.5);font-size:.75rem;white-space:nowrap}
.vol-wrap{display:flex;align-items:center;gap:.5rem}
#vol-slider{width:70px;accent-color:var(--rose)}
.call-btn{padding:.4rem .9rem;border-radius:100px;border:1px solid;font-size:.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s}
#call-start-btn{background:rgba(39,174,96,.15);border-color:rgba(39,174,96,.5);color:#2ecc71}
#call-end-btn{background:rgba(231,76,60,.15);border-color:rgba(231,76,60,.5);color:#e74c3c;display:none}
#host-label{font-size:.7rem;color:var(--rose-l);background:rgba(201,112,122,.1);border:1px solid rgba(201,112,122,.25);padding:.2rem .6rem;border-radius:100px;white-space:nowrap}
#call-area{padding:.75rem;border-bottom:1px solid rgba(255,255,255,.06);display:none;gap:.5rem;flex-wrap:wrap}
#call-area.active{display:flex}
.call-video-wrap{position:relative;flex:1;min-width:120px}
.call-video-wrap video{width:100%;border-radius:8px;background:#111;aspect-ratio:4/3;object-fit:cover}
.call-video-label{position:absolute;bottom:5px;left:6px;font-size:.65rem;background:rgba(0,0,0,.6);padding:2px 6px;border-radius:100px;color:#fff}
#sidebar{width:300px;display:flex;flex-direction:column;background:var(--dark2);border-left:1px solid rgba(255,255,255,.06);flex-shrink:0}
#chat-area{flex:1;display:flex;flex-direction:column;min-height:0}
.chat-header{padding:.75rem 1rem;font-size:.75rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.3);border-bottom:1px solid rgba(255,255,255,.06)}
#messages{flex:1;overflow-y:auto;padding:.75rem;display:flex;flex-direction:column;gap:.6rem}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.msg{max-width:100%}
.msg-meta{font-size:.67rem;color:rgba(255,255,255,.3);margin-bottom:.2rem}
.msg-bubble{background:rgba(255,255,255,.06);padding:.5rem .75rem;border-radius:0 10px 10px 10px;font-size:.85rem;color:rgba(255,255,255,.85);line-height:1.5;word-break:break-word}
.msg.own .msg-bubble{background:rgba(201,112,122,.2);border-radius:10px 0 10px 10px;text-align:right}
.msg.own .msg-meta{text-align:right}
.system-msg{text-align:center;font-size:.72rem;color:rgba(255,255,255,.25);padding:.2rem 0}
#reaction-bar{display:flex;gap:.3rem;padding:.5rem .75rem;border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06);flex-wrap:wrap}
.react-btn{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:.3rem .5rem;font-size:1.1rem;cursor:pointer;transition:background .15s,transform .15s}
.react-btn:hover{background:rgba(255,255,255,.08);transform:scale(1.2)}
#chat-form{display:flex;gap:.5rem;padding:.6rem .75rem;border-top:1px solid rgba(255,255,255,.06)}
#chat-input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:.5rem .9rem;color:#fff;font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;transition:border-color .2s}
#chat-input:focus{border-color:rgba(201,112,122,.5)}
#chat-input::placeholder{color:rgba(255,255,255,.25)}
#chat-send{background:var(--rose);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .2s}
#chat-send:hover{background:var(--brown)}
#chat-send svg{width:14px;height:14px;fill:#fff}
#reaction-canvas{position:fixed;inset:0;pointer-events:none;z-index:999}
.float-reaction{position:absolute;font-size:2rem;animation:floatUp 2.5s ease-out forwards;pointer-events:none}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-200px) scale(1.4);opacity:0}}
#call-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
#call-modal.visible{display:flex}
.call-modal-card{background:var(--dark2);border:1px solid rgba(201,112,122,.3);border-radius:20px;padding:2rem;text-align:center;width:280px}
.call-modal-card h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:400;margin-bottom:.5rem;color:var(--rose-l)}
.call-modal-card p{font-size:.85rem;color:rgba(255,255,255,.5);margin-bottom:1.5rem}
.call-modal-btns{display:flex;gap:.8rem;justify-content:center}
.cm-btn{padding:.6rem 1.4rem;border-radius:100px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.85rem}
.cm-accept{background:#2ecc71;color:#fff}
.cm-reject{background:rgba(231,76,60,.15);color:#e74c3c;border:1px solid rgba(231,76,60,.4)}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--dark2);border:1px solid rgba(201,112,122,.2);color:var(--cream);padding:.6rem 1.2rem;border-radius:100px;font-size:.82rem;z-index:300;animation:toastIn .3s ease;pointer-events:none;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

@media (max-width: 768px) {
  #app { flex-direction: column; }
  
  #video-area { 
    height: 55vh; 
    flex-shrink: 0;
  }
  
  #video-wrap { 
    min-height: 0;
    flex: 1;
  }
  
  #sidebar { 
    width: 100%; 
    height: 45vh;
    border-left: none;
    border-top: 1px solid rgba(255,255,255,.06);
    flex-direction: column;
  }
  
  #reaction-bar { 
    padding: .3rem .5rem;
    flex-wrap: nowrap;
    overflow-x: auto;
  }
  
  .top-bar { 
    padding: .4rem .6rem;
    gap: .4rem;
  }
  
  .top-bar .logo { font-size: 1rem; }
  
  #controls { 
    padding: .4rem .6rem;
    gap: .5rem;
  }
  
  #vol-slider { width: 50px; }
  
  #call-area {
    max-height: 100px;
    padding: .4rem;
  }
  
  .call-video-wrap video {
    max-height: 90px;
    border-radius: 6px;
  }
}
 
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
 <div class="logo">Reel<span>Two</span></div>
 <div class="lobby-card">
 <h2 id="lobby-title">Start a movie night</h2>
 <div class="field">
 <label>Your Name</label>
 <input id="name-input" type="text" placeholder="e.g. Alex" maxlength="30"/>
 </div>
 <div class="field" id="code-field" style="display:none">
 <label>Room Code</label>
 <input id="code-input" type="text" placeholder="e.g. A3BF92C1" maxlength="8" style="text-transform:uppercase"/>
 </div>
 <button class="btn btn-rose" onclick="handleLobby()"> Create Room</button>
 <div class="divider">or</div>
 <button class="btn btn-ghost" onclick="toggleMode()">Join Existing Room</button>
 </div>
</div>

<!-- APP -->
<div id="app">
 <div id="video-area">
 <div class="top-bar">
 <div class="logo">Reel<span>Two</span></div>
 <div class="room-badge" onclick="copyCode()"> Room: <span id="room-code-display"></span></div>
 <div class="members-strip" id="members-strip"></div>
 <span id="host-label" style="display:none"> Host</span>
 <button class="call-btn" id="call-start-btn" onclick="startCall()" style="padding:.3rem .7rem;font-size:.75rem;">📹</button>
 <button class="call-btn" id="call-end-btn" onclick="endCall()" style="display:none;padding:.3rem .7rem;font-size:.75rem;">📵</button>
 </div>

 <div id="video-wrap">
 <div id="upload-overlay">
 <h3> No video loaded</h3>
 <p id="upload-desc">Upload a video file to start watching together.</p>
 <button id="upload-btn" onclick="document.getElementById('file-input').click()">Choose Video File</button>
 <input type="file" id="file-input" accept="video/*" onchange="handleUpload(event)" style="position:absolute;opacity:0;width:1px;height:1px;"/>
 <input type="file" id="subtitle-input" accept=".srt,.vtt" onchange="handleSubtitleUpload(event)" style="position:absolute;opacity:0;width:1px;height:1px;"/>
 <button id="subtitle-btn" style="display:none;background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.2);padding:.5rem 1.2rem;border-radius:100px;cursor:pointer;font-size:.8rem;font-family:'DM Sans',sans-serif;" onclick="document.getElementById('subtitle-input').click()">+ Add Subtitles (.srt / .vtt)</button>
 <button id="change-video-btn" onclick="changeVideo()" style="display:none;background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.2);padding:.4rem 1rem;border-radius:100px;cursor:pointer;font-size:.78rem;font-family:'DM Sans',sans-serif;">🎬 Change Video</button>
 <div id="upload-progress">
 <p>Uploading... <span id="upload-pct">0</span>%</p>
 <div class="progress-wrap"><div id="progress-bar"></div></div>
 </div>
 </div>
 <video id="player" style="display:none" crossorigin="anonymous"></video>
 </div>

 <div id="subtitle-bar" style="display:none;padding:.4rem 1rem;background:var(--dark2);border-top:1px solid rgba(255,255,255,.06);display:none;gap:.5rem;flex-wrap:wrap;">
  <input type="file" id="subtitle-input" accept=".srt,.vtt" style="position:absolute;opacity:0;width:1px;height:1px;"/>
  <button id="subtitle-btn" onclick="document.getElementById('subtitle-input').click()" style="background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.2);padding:.4rem 1rem;border-radius:100px;cursor:pointer;font-size:.78rem;font-family:'DM Sans',sans-serif;">💬 Add Subtitles</button>
  <button id="change-video-btn" onclick="changeVideo()" style="background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.2);padding:.4rem 1rem;border-radius:100px;cursor:pointer;font-size:.78rem;font-family:'DM Sans',sans-serif;">🎬 Change Video</button>
</div>

 <div id="controls" class="hidden">
 <button class="ctrl-btn" id="play-btn" onclick="togglePlay()"> </button>
 <div id="seek-wrap" onclick="seekTo(event)">
 <div id="seek-bg">
 <div id="seek-fill"></div>
 <div id="seek-thumb"></div>
 </div>
 </div>
 <span id="time-display">0:00 / 0:00</span>
 <div class="vol-wrap">
 <span style="font-size:.9rem"> </span>
 <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="1" oninput="player.volume=this.value"/>
 </div>
 </div>

 <div id="call-area">
 <div class="call-video-wrap">
 <video id="local-video" autoplay muted playsinline></video>
 <div class="call-video-label" id="local-label">You</div>
 </div>
 <div class="call-video-wrap">
 <video id="remote-video" autoplay playsinline></video>
 <div class="call-video-label">Partner</div>
 </div>
 </div>
 </div>

 <div id="sidebar">
 <div id="reaction-bar">
 <button class="react-btn" onclick="sendReaction(' ')"> </button>
 <button class="react-btn" onclick="sendReaction(' ')"> </button>
 <button class="react-btn" onclick="sendReaction(' ')"> </button>
 <button class="react-btn" onclick="sendReaction(' ')"> </button>
 <button class="react-btn" onclick="sendReaction(' ')"> </button>
 <button class="react-btn" onclick="sendReaction(' ')"> </button>
 <button class="react-btn" onclick="sendReaction(' ')"> </button>
 <button class="react-btn" onclick="sendReaction(' ')"> </button>
 </div>
 <div id="chat-area">
 <div class="chat-header"> Chat</div>
 <div id="messages"></div>
 <div id="chat-form">
 <input id="chat-input" placeholder="Say something..." maxlength="500" onkeydown="if(event.key==='Enter')sendMessage()"/>
 <button id="chat-send" onclick="sendMessage()">
 <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
 </button>
 </div>
 </div>
 </div>
</div>

<div id="reaction-canvas"></div>

<div id="call-modal">
 <div class="call-modal-card">
 <h3>Incoming Call </h3>
 <p id="call-modal-text">Your partner wants to video chat</p>
 <div class="call-modal-btns">
 <button class="cm-btn cm-accept" onclick="acceptCall()">Accept</button>
 <button class="cm-btn cm-reject" onclick="rejectCall()">Decline</button>
 </div>
 </div>
</div>

<script>
let socket, roomId, myName, isHost = false;
let localStream = null, peerConnection = null, pendingCallFrom = null;
let lobbyMode = "create";
const player = document.getElementById("player");

window.addEventListener("DOMContentLoaded", () => {
 document.getElementById("subtitle-input").addEventListener("change", handleSubtitleUpload);
 const p = new URLSearchParams(window.location.search).get("room");
 if (p) { document.getElementById("code-input").value = p.toUpperCase(); if (lobbyMode !== "join") toggleMode(); }
});

function toggleMode() {
 lobbyMode = lobbyMode === "create" ? "join" : "create";
 const isJoin = lobbyMode === "join";
 document.getElementById("code-field").style.display = isJoin ? "block" : "none";
 document.getElementById("lobby-title").textContent = isJoin ? "Join a movie night" : "Start a movie night";
}

async function handleLobby() {
 const name = document.getElementById("name-input").value.trim();
 if (!name) { showToast("Please enter your name"); return; }
 myName = name;
 if (lobbyMode === "create") {
 const res = await fetch("/api/rooms", { method: "POST" });
 const data = await res.json();
 enterApp(data.roomId);
 } else {
 const code = document.getElementById("code-input").value.trim().toUpperCase();
 if (!code) { showToast("Please enter a room code"); return; }
 const res = await fetch(`/api/rooms/${code}`);
 if (!res.ok) { showToast("Room not found"); return; }
 enterApp(code);
 }
}

function enterApp(rId) {
 roomId = rId;
 document.getElementById("lobby").style.display = "none";
 document.getElementById("app").classList.add("active");
 document.getElementById("room-code-display").textContent = roomId;
 document.getElementById("local-label").textContent = myName + " (you)";
 history.replaceState(null, "", `?room=${roomId}`);
 connectSocket();
}

function connectSocket() {
 socket = io();
 socket.on("connect", () => socket.emit("room:join", { roomId, name: myName }));
 socket.on("video:change", () => {
  player.style.display = "none";
  player.src = "";
  document.getElementById("upload-overlay").classList.remove("hidden");
  document.getElementById("controls").classList.add("hidden");
  document.getElementById("subtitle-bar").style.display = "none";
  document.getElementById("change-video-btn").style.display = "none";
  addSystemMsg("🎬 Host is loading a new video...");
});

 socket.on("room:joined", (data) => {
 isHost = data.isHost;
 if (!isHost) {
 document.getElementById("play-btn").style.display = "none";
 document.getElementById("seek-wrap").style.pointerEvents = "none";
 document.getElementById("seek-wrap").style.opacity = "0.5";
 document.getElementById("call-start-btn").style.display = "none";
}
 document.getElementById("host-label").style.display = isHost ? "inline" : "none";
 updateMembers(data.players);
 data.chat.forEach(m => addMessage(m));
 addSystemMsg(`You joined as ${isHost ? "host " : "guest"}`);
 if (data.hasVideo && data.videoUrl) {
  loadVideo(data.videoUrl);
  if (data.subtitleUrl) loadSubtitles(data.subtitleUrl);
  if (!isHost) setTimeout(() => socket.emit("playback:sync_request"), 1000);
 } else if (!isHost) {
 document.getElementById("upload-desc").textContent = "Waiting for the host to load a video...";
 document.getElementById("upload-btn").style.display = "none";
 }
 });

 socket.on("room:promoted_to_host", () => {
 isHost = true;
 document.getElementById("host-label").style.display = "inline";
 document.getElementById("upload-btn").style.display = "block";
 showToast(" You are now the host");
 });

 socket.on("room:player_joined", ({ name, players }) => { updateMembers(players); addSystemMsg(`${name} joined`); });
 socket.on("room:player_left", ({ name, players }) => { updateMembers(players); addSystemMsg(`${name} left`); });

 socket.on("video:ready", ({ videoUrl, videoName }) => {
 loadVideo(videoUrl);
 addSystemMsg(` "${videoName}" is ready!`);
 });

 socket.on("playback:play", ({ currentTime, timestamp }) => {
 if (isHost) return;
 player.currentTime = currentTime + (Date.now() - timestamp) / 1000;
 player.play();
 document.getElementById("play-btn").textContent = " ";
 });

 socket.on("playback:pause", ({ currentTime }) => {
 if (isHost) return;
 player.currentTime = currentTime;
 player.pause();
 document.getElementById("play-btn").textContent = " ";
 });

 socket.on("playback:seek", ({ currentTime }) => { if (!isHost) player.currentTime = currentTime; });

 socket.on("playback:sync", ({ isPlaying, currentTime, timestamp }) => {
 player.currentTime = currentTime + (isPlaying ? (Date.now() - timestamp) / 1000 : 0);
 if (isPlaying) { player.play(); document.getElementById("play-btn").textContent = " "; }
 else { player.pause(); document.getElementById("play-btn").textContent = " "; }
 });

 socket.on("subtitle:ready", ({ subtitleUrl }) => { loadSubtitles(subtitleUrl); addSystemMsg("💬 Subtitles loaded!"); });
 socket.on("chat:message", addMessage);

 socket.on("reaction:burst", ({ emoji, sender }) => {
 showFloatingReaction(emoji);

 socket.on("webrtc:ice_candidate", ({ candidate }) => { peerConnection?.addIceCandidate(new RTCIceCandidate(candidate)); });
 socket.on("call:request", ({ fromId, fromName }) => {
 pendingCallFrom = fromId;
 document.getElementById("call-modal-text").textContent = `${fromName} wants to video chat`;
 document.getElementById("call-modal").classList.add("visible");
 });
 socket.on("call:accepted", async ({ fromId }) => { await startWebRTC(fromId, true); });

 socket.on("call:ended", () => { cleanupCall(); addSystemMsg("Call ended"); });
 socket.on("error", ({ message }) => showToast(" " + message));
}

function togglePlay() {
 if (!isHost) { showToast("Only the host can control playback"); return; }
 if (player.paused) {
 player.play();
 socket.emit("playback:play", { currentTime: player.currentTime });
 document.getElementById("play-btn").textContent = " ";
 } else {
 player.pause();
 socket.emit("playback:pause", { currentTime: player.currentTime });
 document.getElementById("play-btn").textContent = " ";
 }
}

function seekTo(e) {
 if (!isHost) { showToast("Only the host can seek"); return; }
 if (!player.duration) return;
 const rect = document.getElementById("seek-bg").getBoundingClientRect();
 player.currentTime = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)) * player.duration;
 socket.emit("playback:seek", { currentTime: player.currentTime });
}

function fmt(s) { const m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${String(sec).padStart(2,"0")}`; }

function sendMessage() {
 const input = document.getElementById("chat-input");
 const text = input.value.trim();
 if (!text || !socket) return;
 socket.emit("chat:message", { text });
 input.value = "";
}

function addMessage(msg) {
 const box = document.getElementById("messages");
 const div = document.createElement("div");
 div.className = `msg${msg.sender === myName ? " own" : ""}`;
 const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
 div.innerHTML = `<div class="msg-meta">${esc(msg.sender)} · ${time}</div><div class="msg-bubble">${esc(msg.text)}</div>`;
 box.appendChild(div);
 box.scrollTop = box.scrollHeight;
}

function addSystemMsg(text) {

 div.className = "system-msg"; div.textContent = text;
 box.appendChild(div); box.scrollTop = box.scrollHeight;
}

const ICE = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

async function startCall() { socket.emit("call:request"); addSystemMsg(" Calling..."); }

async function acceptCall() {
 document.getElementById("call-modal").classList.remove("visible");
 await setupLocalStream();
 socket.emit("call:accept", { targetId: pendingCallFrom });
}

function rejectCall() {
 document.getElementById("call-modal").classList.remove("visible");
 socket.emit("call:reject", { targetId: pendingCallFrom });
 pendingCallFrom = null;
}

async function setupLocalStream() {
 try { localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); }
 catch(e) { try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); } catch(e2) {} }
 if (localStream) document.getElementById("local-video").srcObject = localStream;
 document.getElementById("call-area").classList.add("active");
 document.getElementById("call-start-btn").style.display = "none";
 document.getElementById("call-end-btn").style.display = "";
}

async function startWebRTC(peerId, isInitiator) {
 peerConnection = new RTCPeerConnection(ICE);
 localStream?.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
 peerConnection.ontrack = e => { document.getElementById("remote-video").srcObject = e.streams[0]; };
 peerConnection.onicecandidate = e => { if (e.candidate) socket.emit("webrtc:ice_candidate", { candidate: e.candidate, targetId: peerId }); };
 if (isInitiator) {
 await setupLocalStream();
 localStream?.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
 const offer = await peerConnection.createOffer();
 await peerConnection.setLocalDescription(offer);
 socket.emit("webrtc:offer", { offer, targetId: peerId });
 }
}

async function handleOffer(offer, fromId) {
 if (!peerConnection) {
 peerConnection = new RTCPeerConnection(ICE);
 peerConnection.ontrack = e => { document.getElementById("remote-video").srcObject = e.streams[0]; };
 peerConnection.onicecandidate = e => { if (e.candidate) socket.emit("webrtc:ice_candidate", { candidate: e.candidate, targetId: fromId }); };
 localStream?.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
 }
 await peerConnection.setRemoteDescription(offer);
 const answer = await peerConnection.createAnswer();
 await peerConnection.setLocalDescription(answer);
 socket.emit("webrtc:answer", { answer, targetId: fromId });
}

function endCall() { socket.emit("call:end"); cleanupCall(); }

function cleanupCall() {
 peerConnection?.close(); peerConnection = null;
 localStream?.getTracks().forEach(t => t.stop()); localStream = null;
 document.getElementById("local-video").srcObject = null;
 document.getElementById("remote-video").srcObject = null;
 document.getElementById("call-area").classList.remove("active");
 document.getElementById("call-start-btn").style.display = "";
 document.getElementById("call-end-btn").style.display = "none";
 document.getElementById("call-modal").classList.remove("visible");
}
